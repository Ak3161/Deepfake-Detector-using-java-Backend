services:

  mysql:
    image: mysql:8.0
    container_name: deepfake-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: deepfake_detector
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - deepfake-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: deepfake-backend
    restart: on-failure
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/deepfake_detector
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQLDialect
      SIGHTENGINE_API_USER: 20920835
      SIGHTENGINE_API_SECRET: vonAAdbgD8zHWjGggEQX7BdaMHXjhqiY
      SIGHTENGINE_API_URL: https://api.sightengine.com/1.0/check.json
      GEMINI_API_KEY: AIzaSyDTIpKgW3Qi3izpI4StN7T8g_VPMb1zMYM
      GEMINI_API_URL: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - deepfake-network

volumes:
  mysql-data:

networks:
  deepfake-network:
